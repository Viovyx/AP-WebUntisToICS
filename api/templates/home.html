<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../static/style.css" />
        <title>WebUntisSync</title>
    </head>
    <body>
        <h1>Select your class:</h1>
        <p>
            Use your browsers built-in search functionality: 'ctrl+f' or 'Find
            in page'
        </p>
        <div class="class-list">
            {% for class in classes %}
            <div onclick="copy('{{ class.id }}')">
                <p>{{ class.name }}</p>
                <span>{{ class.id }}</span>
            </div>
            {% endfor %}
        </div>
        <script>
            function copy(classId) {
                url = location.href + "calendar?class=" + classId;
                navigator.clipboard.writeText(url);
                alert(
                    `${url} copied to clipboard!\nPaste it in your calendar app to sync.`,
                );
            }
        </script>
    </body>
</html>
